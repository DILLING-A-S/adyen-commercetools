# Builds the notification module as a Docker image and publishes it to the GitHub
# Container Registry (ghcr.io). The image is linked to this repository and appears
# under the organization's packages: https://github.com/orgs/DILLING-A-S/packages
#
# Auth uses the built-in GITHUB_TOKEN (no Docker Hub secrets needed).
name: Publish notification image (GHCR)

on:
  push:
    branches:
      - master
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # github.repository_owner is "DILLING-A-S"; metadata-action lowercases it for ghcr.
  IMAGE_NAME: ${{ github.repository_owner }}/adyen-commercetools-notification

jobs:
  build-and-push:
    name: Build and push notification image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./notification
          file: ./notification/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
